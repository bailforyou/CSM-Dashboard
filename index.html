<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Skribe CSM Pod — Weekly Engagement Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; margin: 0; padding: 24px; background: #F8FAFC; color: #0F172A; line-height: 1.5; }
.header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; gap: 16px; flex-wrap: wrap; }
.title { font-size: 22px; font-weight: 700; margin: 0 0 4px; }
.subtitle { font-size: 13px; color: #64748B; margin: 0; }
.actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.btn { padding: 8px 14px; border-radius: 8px; border: 1px solid #E2E8F0; background: white; color: #0F172A; font-size: 13px; font-weight: 500; cursor: pointer; }
.btn:hover { background: #F1F5F9; }
.btn-primary { background: #1E40AF; color: white; border-color: #1E40AF; }
.btn-primary:hover { background: #1E3A8A; }
.kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
.kpi { background: white; padding: 14px 16px; border-radius: 10px; border: 1px solid #E2E8F0; }
.kpi-label { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: #64748B; font-weight: 600; }
.kpi-value { font-size: 26px; font-weight: 700; margin-top: 4px; line-height: 1.1; }
.kpi-sub { font-size: 11px; color: #94A3B8; margin-top: 2px; }
.kpi.alert .kpi-value { color: #DC2626; }
.kpi.good .kpi-value { color: #059669; }
.kpi.warn .kpi-value { color: #D97706; }
.section { background: white; border: 1px solid #E2E8F0; border-radius: 12px; padding: 18px; margin-bottom: 18px; }
.section-title { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .03em; margin: 0 0 14px; display: flex; justify-content: space-between; align-items: center; }
.section-title .meta { font-size: 11px; color: #94A3B8; font-weight: 500; text-transform: none; letter-spacing: 0; }
.charts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.chart-card { background: white; padding: 16px; border-radius: 10px; border: 1px solid #E2E8F0; }
.chart-card h3 { margin: 0 0 12px; font-size: 13px; font-weight: 600; color: #475569; }
.chart-box { position: relative; height: 200px; }
.filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 14px; align-items: center; }

.step-owner-toggle { display: flex; gap: 8px; align-items: center; margin: 16px 0 10px; flex-wrap: wrap; }
.sot-label { font-size: 12px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: .03em; margin-right: 4px; }
.sot-btn { font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 14px; border: 1.5px solid #E2E8F0; background: white; color: #475569; cursor: pointer; font-family: inherit; }
.sot-btn:hover { border-color: #94A3B8; }
.sot-btn.active { background: #0F172A; border-color: #0F172A; color: white; }
.step-owner-badge { display: inline-block; font-size: 10.5px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-left: 6px; }
.step-owner-badge.csm { background: #DBEAFE; color: #1E3A8A; }
.step-owner-badge.asst { background: #FEF3C7; color: #92400E; }
.lane-chips { display: flex; gap: 8px; margin: 12px 0 16px; flex-wrap: wrap; }
.lane-chip { font-size: 12.5px; font-weight: 600; padding: 7px 14px; border-radius: 18px; border: 1.5px solid #E2E8F0; background: white; color: #475569; cursor: pointer; transition: all .12s; font-family: inherit; display: inline-flex; align-items: center; gap: 8px; }
.lane-chip:hover { border-color: #94A3B8; }
.lane-chip.active { background: #1E40AF; border-color: #1E40AF; color: white; }
.lane-chip.active .lane-count { background: rgba(255,255,255,.22); color: white; }
.lane-count { background: #F1F5F9; color: #475569; padding: 1px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; min-width: 18px; text-align: center; }
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filter-group label { font-size: 11px; color: #64748B; font-weight: 600; text-transform: uppercase; letter-spacing: .03em; }
.filter-group select, .filter-group input { padding: 7px 10px; border-radius: 7px; border: 1px solid #E2E8F0; font-size: 13px; background: white; min-width: 130px; }
.filter-group input { min-width: 220px; }
.pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 600; margin-right: 4px; margin-bottom: 2px; }
.pill-t1 { background: #DCFCE7; color: #166534; }
.pill-t2 { background: #DBEAFE; color: #1E40AF; }
.pill-t3 { background: #F1F5F9; color: #475569; }
.pill-t4 { background: #FEE2E2; color: #991B1B; }
.pill-critical { background: #DC2626; color: white; }
.pill-high { background: #F97316; color: white; }
.pill-medium { background: #EAB308; color: #422006; }
.pill-low { background: #94A3B8; color: white; }
.pill-signal { background: #FEF3C7; color: #78350F; }
.pill-signal-bad { background: #FEE2E2; color: #991B1B; }
.pill-signal-good { background: #DCFCE7; color: #166534; }
.pill-signal-grow { background: #DBEAFE; color: #1E40AF; }
.status-pill { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; }
.status-open { background: #FEF3C7; color: #78350F; }
.status-working { background: #DBEAFE; color: #1E40AF; }
.status-reactivated { background: #DCFCE7; color: #166534; }
.status-closed { background: #F1F5F9; color: #64748B; }
.firm-cell { font-weight: 600; }
.firm-sub { font-size: 11px; color: #64748B; font-weight: 400; margin-top: 2px; }
.score-bar { width: 50px; height: 8px; background: #E2E8F0; border-radius: 4px; overflow: hidden; display: inline-block; vertical-align: middle; margin-right: 6px; }
.score-bar-fill { height: 100%; }
.action-text { font-size: 12px; color: #334155; line-height: 1.45; }
.task-table { width: 100%; border-collapse: collapse; font-size: 12.5px; background: white; }
.task-table th { text-align: left; padding: 10px 12px; background: #F8FAFC; font-size: 11px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: .03em; border-bottom: 1px solid #E2E8F0; cursor: pointer; }
.task-table th:hover { background: #F1F5F9; color: #1E40AF; }
.task-table th .sort-ind { color: #94A3B8; margin-left: 4px; font-size: 10px; }
.task-table th.sorted .sort-ind { color: #1E40AF; }
.task-table td { padding: 10px 12px; vertical-align: top; border-bottom: 1px solid #F1F5F9; font-size: 12.5px; }
.task-table tbody tr:hover { background: #F8FAFC; cursor: pointer; }
.task-table tbody tr.reactivated { background: #F0FDF4; }
.task-table .col-idx { color: #94A3B8; font-size: 11px; width: 36px; }
.pagination-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; font-size: 12px; color: #64748B; }
.pagination-bar .page-btns button { padding: 4px 10px; border: 1px solid #E2E8F0; background: white; border-radius: 6px; font-size: 12px; cursor: pointer; margin-left: 4px; }
.pagination-bar .page-btns button.current { background: #1E40AF; color: white; border-color: #1E40AF; }
.pagination-bar .page-btns button:disabled { color: #CBD5E1; }
.table-wrap { overflow-x: auto; }
.modal-overlay { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.55); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
.modal-overlay.open { display: flex; }
.kpi.clickable { cursor: pointer; transition: transform .12s, box-shadow .12s; }
.kpi.clickable:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(15,23,42,.12); }
.drill-table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
.drill-table th { text-align: left; padding: 8px 10px; background: #F8FAFC; border-bottom: 2px solid #E2E8F0; font-size: 11px; text-transform: uppercase; letter-spacing: .03em; color: #64748B; }
.drill-table td { padding: 9px 10px; border-bottom: 1px solid #F1F5F9; }
.drill-table tr:hover td { background: #F8FAFC; cursor: pointer; }
.drill-empty { padding: 30px; text-align: center; color: #94A3B8; font-size: 13px; }

.modal { background: white; border-radius: 12px; padding: 24px; max-width: 720px; width: 100%; max-height: 90vh; overflow-y: auto; }
.modal h2 { margin: 0 0 6px; font-size: 18px; }
.modal p { color: #64748B; font-size: 13px; margin: 0 0 16px; }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.drawer-backdrop { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.18); opacity: 0; pointer-events: none; transition: opacity .2s; z-index: 899; }
.drawer-backdrop.open { opacity: 1; pointer-events: auto; }
.drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 460px; max-width: 100%; background: white; box-shadow: -8px 0 28px rgba(0,0,0,.12); transform: translateX(100%); transition: transform .25s; overflow-y: auto; z-index: 900; padding: 24px; }
.drawer.open { transform: translateX(0); }
.drawer-close { position: absolute; top: 16px; right: 16px; background: none; border: none; cursor: pointer; font-size: 22px; color: #64748B; }
.drawer h2 { margin: 0 0 4px; font-size: 18px; }
.drawer-owner-sel { font-size: 12px; padding: 2px 6px; border: 1px solid #CBD5E1; border-radius: 4px; background: white; color: #0F172A; cursor: pointer; margin: 0 4px; }
.drawer-owner-sel:hover { border-color: #94A3B8; }
.drawer-owner-sel:focus { outline: 2px solid #2563EB; outline-offset: 1px; }
.drawer-owner-reset { font-size: 10.5px; padding: 2px 6px; border: 1px solid #FCA5A5; border-radius: 4px; background: #FEF2F2; color: #991B1B; cursor: pointer; margin-left: 4px; }
.drawer-owner-reset:hover { background: #FEE2E2; }
.drawer .firm-meta { font-size: 12px; color: #64748B; margin-bottom: 16px; }
.score-breakdown{margin-top:6px;}
.sb-row{display:grid;grid-template-columns:110px 1fr 60px;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid #F1F5F9;font-size:12px;}
.sb-row:last-child{border-bottom:none;}
.sb-label{font-weight:600;color:#0F172A;}
.sb-label .sb-weight{font-weight:400;color:#94A3B8;font-size:10.5px;margin-left:4px;}
.sb-meta{font-size:11px;color:#64748B;margin-top:2px;font-weight:400;}
.sb-bar{height:8px;background:#F1F5F9;border-radius:4px;overflow:hidden;position:relative;}
.sb-bar-fill{height:100%;border-radius:4px;transition:width .2s;}
.sb-bar-fill.hi{background:#10B981;}
.sb-bar-fill.mid{background:#F59E0B;}
.sb-bar-fill.lo{background:#EF4444;}
.sb-contrib{text-align:right;font-weight:600;color:#0F172A;font-variant-numeric:tabular-nums;}
.sb-contrib .sb-contrib-sub{font-weight:400;color:#94A3B8;font-size:10.5px;display:block;}
.sb-total{margin-top:8px;padding-top:8px;border-top:2px solid #0F172A;display:flex;justify-content:space-between;font-weight:700;font-size:13px;color:#0F172A;}
.sb-help{font-size:11px;color:#64748B;margin-bottom:8px;line-height:1.4;}
.cad-box{margin-bottom:8px;padding:10px;background:#FFF;border:1px solid #E2E8F0;border-radius:6px;}
.cad-box.complete{background:#F0FDF4;border-color:#86EFAC;}
.cad-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.cad-title{font-size:11px;text-transform:uppercase;letter-spacing:.05em;font-weight:700;color:#0F172A;}
.cad-step{font-size:11px;font-weight:600;color:#64748B;}
.cad-due{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px;background:#F1F5F9;color:#475569;}
.cad-due.soon{background:#FEF3C7;color:#92400E;}
.cad-due.overdue{background:#FEE2E2;color:#991B1B;}
.cad-due.hold{background:#E0E7FF;color:#3730A3;}
.cad-pills{display:flex;gap:4px;margin:8px 0 10px;flex-wrap:wrap;}
.cad-pill{font-size:10.5px;font-weight:600;padding:5px 9px;border-radius:14px;border:1.5px solid #E2E8F0;background:#F8FAFC;color:#475569;cursor:pointer;transition:all .12s;font-family:inherit;}
.cad-pill:hover{border-color:#94A3B8;background:#F1F5F9;}
.cad-pill.done{background:#D1FAE5;border-color:#10B981;color:#065F46;}
.cad-pill.current{background:#DBEAFE;border-color:#2563EB;color:#1E3A8A;box-shadow:0 0 0 2px rgba(37,99,235,.15);}
.cad-pill.pending{background:#F8FAFC;border-color:#CBD5E1;color:#64748B;}
.cad-pill.selected{outline:2px solid #1E40AF;outline-offset:1px;}
.cad-step-row{display:flex;gap:8px;align-items:baseline;margin-top:6px;}
.cad-step-type{font-size:11px;font-weight:700;text-transform:uppercase;color:#2563EB;letter-spacing:.04em;}
.cad-step-label{font-size:12.5px;color:#0F172A;font-weight:500;}
.cad-next{font-size:11px;color:#64748B;margin-top:4px;}
.cad-sub{font-size:11px;color:#94A3B8;margin-top:6px;font-style:italic;}
.col-cad{font-size:11px;color:#334155;}
.step-asset{margin-top:8px;padding:10px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;}
.step-asset.done-state{background:#F0FDF4;border-color:#86EFAC;color:#065F46;font-style:italic;}
.step-asset .sa-head{margin-bottom:6px;}
.step-asset .sa-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#0F172A;font-weight:700;}
.email-block{margin-top:8px;padding:10px;background:#F8FAFC;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;}
.email-block .e-contact{font-weight:600;color:#0F172A;margin-bottom:6px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.email-block .e-contact a{color:#2563EB;text-decoration:none;}
.email-block .e-contact a:hover{text-decoration:underline;}
.email-block .e-label{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#64748B;font-weight:700;margin-top:8px;margin-bottom:3px;}
.email-block .e-subject{font-weight:600;color:#0F172A;padding:6px 8px;background:white;border:1px solid #E2E8F0;border-radius:4px;}
.email-block .e-body{white-space:pre-wrap;color:#334155;padding:8px;background:white;border:1px solid #E2E8F0;border-radius:4px;font-family:inherit;line-height:1.45;max-height:240px;overflow:auto;}
.email-block .e-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;}
.email-block .e-btn{font-size:11px;padding:4px 10px;border:1px solid #CBD5E1;background:white;border-radius:4px;cursor:pointer;color:#334155;font-weight:500;}
.email-block .e-btn:hover{background:#F1F5F9;}
.email-block .e-btn.primary{background:#2563EB;color:white;border-color:#2563EB;}
.email-block .e-btn.primary:hover{background:#1D4ED8;}
.email-block .e-nocontact{color:#92400E;background:#FEF3C7;border:1px solid #FCD34D;padding:4px 8px;border-radius:4px;font-size:11px;font-weight:500;display:inline-block;margin-bottom:6px;}
.drawer-section { margin-bottom: 18px; padding-bottom: 16px; border-bottom: 1px solid #F1F5F9; }
.drawer-section h4 { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: #64748B; margin: 0 0 10px; font-weight: 700; }
.drawer-stat { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
.drawer-stat .v { font-weight: 600; }
.drawer-action { background: #F8FAFC; padding: 12px; border-radius: 8px; margin-bottom: 8px; border-left: 4px solid #1E40AF; font-size: 13px; }
.drawer-action.high { border-left-color: #DC2626; }
.drawer-action.medium { border-left-color: #EAB308; }
.drawer-action.low { border-left-color: #94A3B8; }
.drawer-action .title { font-weight: 600; }
.drawer-action .script { color: #475569; font-size: 12px; line-height: 1.5; }
.empty-state { text-align: center; padding: 40px 20px; color: #94A3B8; font-size: 13px; }
.timeline-item { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px dashed #F1F5F9; }
.timeline-dot { width: 8px; height: 8px; border-radius: 50%; background: #1E40AF; margin-top: 6px; flex-shrink: 0; }
.timeline-content { flex: 1; font-size: 12px; }
.ti-head { display: flex; justify-content: space-between; font-weight: 600; }
.ti-date { font-weight: 400; color: #94A3B8; font-size: 11px; }
.ti-note { color: #475569; margin-top: 2px; }
.log-form { background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 8px; padding: 10px; margin-top: 8px; }
.log-form .row { display: grid; grid-template-columns: 1fr 130px; gap: 8px; margin-bottom: 6px; }
.log-form select, .log-form input, .log-form textarea { width: 100%; padding: 6px 8px; border-radius: 6px; border: 1px solid #E2E8F0; font-size: 12px; background: white; font-family: inherit; }
.log-form textarea { resize: vertical; min-height: 50px; }
.log-form .form-actions { display: flex; justify-content: flex-end; gap: 6px; margin-top: 6px; }
.btn-sm { padding: 5px 12px; font-size: 11px; border-radius: 6px; }
.banner { background: #EFF6FF; border: 1px solid #BFDBFE; color: #1E40AF; padding: 10px 14px; border-radius: 8px; margin-bottom: 14px; font-size: 12.5px; }
@media (max-width: 900px) { .charts { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1 class="title">Skribe CSM Pod — Weekly Engagement Dashboard</h1>
    <p class="subtitle">Signal-driven cadence for law firm accounts. Data current as of May 21, 2026.</p>
  </div>
  <div class="actions">
    <button class="btn" id="btn-playbook">Playbook</button>
  </div>
</div>

<div id="status-banner" class="banner" style="display:none;"></div>

<div class="kpis" id="kpis"></div>

<div class="section">
  <h2 class="section-title">Portfolio Snapshot</h2>
  <div class="charts">
    <div class="chart-card"><h3>Tier distribution</h3><div class="chart-box"><canvas id="chart-tier"></canvas></div></div>
    <div class="chart-card"><h3>Dormancy curve (days since last transcript)</h3><div class="chart-box"><canvas id="chart-dormancy"></canvas></div></div>
    <div class="chart-card"><h3>Active signals</h3><div class="chart-box"><canvas id="chart-signals"></canvas></div></div>
  </div>
</div>

<div class="section">
  <h2 class="section-title">CSM Task List — Prioritized <span class="meta" id="task-count"></span></h2>
  <div class="step-owner-toggle" id="step-owner-toggle">
    <span class="sot-label">View as:</span>
    <button class="sot-btn active" data-sot="all">All</button>
    <button class="sot-btn" data-sot="CSM">CSM</button>
    <button class="sot-btn" data-sot="CSM Asst">Assistant</button>
    <button class="sot-btn" data-sot="SDR/Monaco">Sales Rep</button>
  </div>
  <div class="lane-chips" id="lane-chips">
    <button class="lane-chip active" data-lane="monitor">Monitor (30-59d) <span class="lane-count" id="lc-monitor">0</span></button>
    <button class="lane-chip" data-lane="atrisk">At Risk (60-89d) <span class="lane-count" id="lc-atrisk">0</span></button>
    <button class="lane-chip" data-lane="dormant">Dormant (90+d) <span class="lane-count" id="lc-dormant">0</span></button>
    <button class="lane-chip" data-lane="wraps">Recent Wraps <span class="lane-count" id="lc-wraps">0</span></button>
    <button class="lane-chip" data-lane="all">All Queue <span class="lane-count" id="lc-all">0</span></button>
    <button class="lane-chip" data-lane="strategic">Strategic <span class="lane-count" id="lc-strategic">0</span></button>
  </div>
  <div class="filters">
    <div class="filter-group"><label>Search firm</label><input type="text" id="filter-search" placeholder="Firm name..."></div>
    <div style="display:none;"><select id="filter-tier"><option value=""></option></select></div>
    <div style="display:none;"><select id="filter-priority"><option value=""></option></select></div>
    <div style="display:none;"><select id="filter-signal"><option value=""></option></select></div>
    <div style="display:none;"><select id="filter-owner"><option value=""></option></select></div>
    <div class="filter-group"><label>Status</label><select id="filter-status"><option value="open-working">Open + Working</option><option value="open">Open</option><option value="working">Working</option><option value="reactivated">Reactivated</option><option value="closed">Closed</option><option value="">All statuses</option></select></div>
    <div style="display:none;"><select id="filter-live"><option value="active"></option></select></div>
    <div class="filter-group" style="margin-left:auto;"><label>&nbsp;</label><button class="btn" id="btn-import-activity">Import activity CSV</button><input type="file" id="file-import-activity" accept=".csv,text/csv" style="display:none"><button class="btn" id="btn-export-activity" style="margin-left:6px;">Export activity log</button><button class="btn" id="btn-export-tasks" style="margin-left:6px;">Export tasks</button></div>
  </div>
  <div id="task-grid"></div>
</div>

<div class="modal-overlay" id="modal-drill">
  <div class="modal" style="max-width:920px;">
    <h2 id="drill-title">Firms</h2>
    <p id="drill-subtitle"></p>
    <div id="drill-content"></div>
    <div class="modal-actions"><button class="btn btn-primary" id="btn-close-drill">Close</button></div>
  </div>
</div>
<div class="modal-overlay" id="modal-playbook">

function daysSince(iso) { if (!iso) return 999; const d = new Date(iso); if (isNaN(d)) return 999; return Math.max(0, Math.floor((TODAY - d) / 86400000)); }
function tierOf(f) { const d = daysSince(f.lastTranscript); if (d > 90) return 'T4 Dormant'; if (f.tpm >= 5) return 'T1 Strategic'; if (f.tpm >= 1) return 'T2 Growth'; if (f.tpm > 0 || d <= 60) return 'T3 Emerging'; return 'T4 Dormant'; }
function engagementScore(f) {
  const d = daysSince(f.lastTranscript);
  const rec = d <= 7 ? 100 : d <= 14 ? 85 : d <= 30 ? 65 : d <= 60 ? 40 : d <= 90 ? 20 : 0;
  const vol = Math.min(100, (f.tpm / 5) * 100);
  const breadth = Math.min(100, ((f.users || 0) * 8) + ((f.matters || 0) * 3));
  const depth = Math.min(100, ((f.clipUsers || 0) * 15) + ((f.playlistUsers || 0) * 20));
  const revenue = f.sales > 0 ? Math.min(100, Math.log10(f.sales + 1) / 4 * 100) : 0;
  return Math.round(rec * 0.30 + vol * 0.25 + breadth * 0.20 + depth * 0.15 + revenue * 0.10);
}

function reactivationScore(f) {
  // Per spec: Reactivation Priority Score
  // Revenue Last 12 Months (30%) — proxy: lifetime sales (no time-series data)
  const revScore = (f.sales || 0) > 0 ? Math.min(100, Math.log10(f.sales + 1) / 4 * 100) : 0;
  // Live Event Volume L12M (25%) — proxy: live tpm * 12, normalized to 60/yr
  const volAnnual = (f.tpm || 0) * 12;
  const volScore = Math.min(100, volAnnual / 60 * 100);
  // Historical Booking Frequency (20%) — live tpm directly
  const freqScore = Math.min(100, (f.tpm || 0) / 5 * 100);
  // Days Since Last Live Event (15%) — 30d→0, 60d→50, 90d+→100
  const d = (typeof f.daysLast === 'number') ? f.daysLast : daysSince(f.lastTranscript);
  const daysScore = Math.min(100, Math.max(0, (d - 30) * 100 / 60));
  // Strategic Account Flag (10%)
  const stratScore = (f.tier === 'T1 Strategic' || (f.tpm || 0) >= 5) ? 100 : 0;
  return Math.round(revScore * 0.30 + volScore * 0.25 + freqScore * 0.20 + daysScore * 0.15 + stratScore * 0.10);
}
function reactivationLevel(score) {
  if (score >= 80) return 'High';
  if (score >= 60) return 'Medium';
  return 'Low';
}
function scoreBreakdown(f) {
  const d = (typeof f.daysLast === 'number') ? f.daysLast : daysSince(f.lastTranscript);
  const recScore = d <= 7 ? 100 : d <= 14 ? 85 : d <= 30 ? 65 : d <= 60 ? 40 : d <= 90 ? 20 : 0;
  const volScore = Math.min(100, ((f.tpm || 0) / 5) * 100);
  const brScore = Math.min(100, ((f.users || 0) * 8) + ((f.matters || 0) * 3));
  const dpScore = Math.min(100, ((f.clipUsers || 0) * 15) + ((f.playlistUsers || 0) * 20));
  const rvScore = f.sales > 0 ? Math.min(100, Math.log10(f.sales + 1) / 4 * 100) : 0;
  const recBand = d <= 7 ? 'Active this week' : d <= 14 ? 'Active last 2 weeks' : d <= 30 ? 'Active this month' : d <= 60 ? 'Slipping' : d <= 90 ? 'Dormant risk' : 'Deeply dormant';
  return [
    { key:'rec', label:'Recency', weight:0.30, score:recScore, meta:d + 'd since last transcript — ' + recBand },
    { key:'vol', label:'Volume',  weight:0.25, score:volScore, meta:(f.tpm||0).toFixed(1) + ' transcripts/mo (100 = 5+/mo)' },
    { key:'br',  label:'Breadth', weight:0.20, score:brScore,  meta:(f.users||0) + ' users · ' + (f.matters||0) + ' matters' },
    { key:'dp',  label:'Depth',   weight:0.15, score:dpScore,  meta:(f.clipUsers||0) + ' clip users · ' + (f.playlistUsers||0) + ' playlist users' },
    { key:'rv',  label:'Revenue', weight:0.10, score:rvScore,  meta:'$' + (f.sales||0).toLocaleString() + ' total spend' }
  ];
}
function renderScoreBreakdown(f) {
  const parts = scoreBreakdown(f);
  let html = '<div class="sb-help">Score is a 0-100 composite. Each component below shows the raw signal, its 0-100 sub-score, weight, and weighted contribution.</div><div class="score-breakdown">';
  let total = 0;
  parts.forEach(p => {
    const w = Math.round(p.weight * 100);
    const contrib = p.score * p.weight;
    total += contrib;
    const cls = p.score >= 70 ? 'hi' : p.score >= 40 ? 'mid' : 'lo';
    html += '<div class="sb-row">' +
      '<div><div class="sb-label">' + p.label + '<span class="sb-weight">' + w + '%</span></div><div class="sb-meta">' + escapeHtml(p.meta) + '</div></div>' +
      '<div><div class="sb-bar"><div class="sb-bar-fill ' + cls + '" style="width:' + Math.max(2, p.score) + '%"></div></div></div>' +
      '<div class="sb-contrib">' + contrib.toFixed(1) + '<span class="sb-contrib-sub">of ' + w + '</span></div>' +
      '</div>';
  });
  html += '<div class="sb-total"><span>Engagement score</span><span>' + Math.round(total) + ' / 100</span></div>';
  html += '</div>';
  return html;
}

function detectReactivations() {

  for (const f of state.firms) {

    if (!acts || acts.length === 0) continue;
    if (state.reactivated[f.tenantId]) continue;
    if (!f.lastTranscript) continue;

let tableSort = { key: 'priority', dir: 'asc' };
let tablePage = 1;
const PAGE_SIZE = 25;
const COLUMNS = [
  { key: 'idx', label: '#', width: '40px' },
  { key: 'name', label: 'Firm', width: '210px' },
  { key: 'tier', label: 'Tier', width: '95px' },
  { key: 'score', label: 'Score', width: '90px' },
  { key: 'priority', label: 'Priority', width: '85px' },
  { key: 'status', label: 'Status', width: '95px' },
  { key: 'signals', label: 'Signals', width: '150px' },
  { key: 'activity', label: 'Last activity', width: '130px' },
  { key: 'action', label: 'Recommended action' },
  { key: 'role', label: 'Role', width: '85px' },
  { key: 'name', label: 'Name', width: '85px' },
  { key: 'cadence', label: 'Cadence', width: '140px' },
  { key: 'due', label: 'Due', width: '95px' }

function getFilteredRows() {
  const search = document.getElementById('filter-search').value.toLowerCase().trim();
  const tier = document.getElementById('filter-tier').value;
  const priority = document.getElementById('filter-priority').value;
  const signal = document.getElementById('filter-signal').value;
  const owner = document.getElementById('filter-owner').value;
  const sf = document.getElementById('filter-status').value;
  const liveFilter = document.getElementById('filter-live').value;
  // SEARCH SHORT-CIRCUIT: when user types in search, bypass lane/status filters and find any firm matching name
  if (search) {
    return state.enriched.filter(x => (x.name || '').toLowerCase().includes(search))
      .sort((a, b) => (b.sales || 0) - (a.sales || 0));
  }
  let rows = state.enriched.filter(e => e.priority || e.status === 'reactivated');
  if (liveFilter === 'active') rows = rows.filter(x => (x.live || 0) >= 1);
  if (sf === 'open-working') rows = rows.filter(x => x.status === 'open' || x.status === 'working');
  else if (sf === 'open') rows = rows.filter(x => x.status === 'open');
  else if (sf === 'working') rows = rows.filter(x => x.status === 'working');
  else if (sf === 'reactivated') rows = rows.filter(x => x.status === 'reactivated');
  else if (sf === 'closed') rows = rows.filter(x => x.status === 'closed');
  if (search) rows = rows.filter(x => x.name.toLowerCase().includes(search));
  if (tier) rows = rows.filter(x => x.tier === tier);
  if (priority) rows = rows.filter(x => x.priority === priority);
  if (signal) rows = rows.filter(x => x.signals.includes(signal));
  if (owner) rows = rows.filter(x => x.owner === owner);
  // Lane filter — Reactivation workflow per spec
  // Hard 7-day outreach suppression — if firm was emailed in last 7d, do not surface in any action lane
  function _suppressRecentlyEmailed(rows) {
    const todayD = new Date(); todayD.setUTCHours(0,0,0,0);
    return rows.filter(x => {
      const emails = (x.activities || []).filter(a => a.type === 'email');
      if (!emails.length) return true;
      const last = emails.reduce((m,a) => a.date > m ? a.date : m, '0000-00-00');
      const le = new Date(last + 'T00:00:00Z');
      const daysSinceEmail = Math.round((todayD - le) / 86400000);
      return daysSinceEmail >= 7;
    });
  }
  if (state.lane === 'monitor') rows = _suppressRecentlyEmailed(rows.filter(x => x.tier !== 'T1 Strategic' && x.signals.includes('MONITOR')));
  else if (state.lane === 'atrisk') rows = _suppressRecentlyEmailed(rows.filter(x => x.tier !== 'T1 Strategic' && x.signals.includes('AT_RISK')));
  else if (state.lane === 'dormant') rows = _suppressRecentlyEmailed(rows.filter(x => x.tier !== 'T1 Strategic' && x.signals.includes('DORMANT')));
  else if (state.lane === 'wraps') rows = _suppressRecentlyEmailed(rows.filter(x => x.tier !== 'T1 Strategic' && x.signals.includes('POST_EVENT')));
  else if (state.lane === 'strategic') rows = state.enriched.filter(e => e.tier === 'T1 Strategic');
  else if (state.lane === 'all') rows = _suppressRecentlyEmailed(rows.filter(x => x.tier !== 'T1 Strategic'));
  // Step-owner filter — surface firms whose CURRENT cadence step belongs to the selected role
  if (state.stepOwner && state.stepOwner !== 'all') {
    rows = rows.filter(x => x.stepOwnerRole === state.stepOwner);
  }
  const k = tableSort.key, dir = tableSort.dir === 'asc' ? 1 : -1;
  rows.sort((a, b) => {
    if (k !== 'status') { if (a.status === 'reactivated' && b.status !== 'reactivated') return 1; if (b.status === 'reactivated' && a.status !== 'reactivated') return -1; }
    let av, bv;
    if (k === 'priority') { av = PRIORITY_ORDER[a.priority] != null ? PRIORITY_ORDER[a.priority] : 99; bv = PRIORITY_ORDER[b.priority] != null ? PRIORITY_ORDER[b.priority] : 99; }
    else if (k === 'name') { av = a.name.toLowerCase(); bv = b.name.toLowerCase(); }
    else if (k === 'tier') { av = a.tier; bv = b.tier; }
    else if (k === 'score') { av = a.score; bv = b.score; }
    else if (k === 'status') { av = a.status; bv = b.status; }
    else if (k === 'owner') { av = a.owner; bv = b.owner; }
    else if (k === 'role') { av = a.assignedRole || ''; bv = b.assignedRole || ''; }
    else if (k === 'name') { av = a.assignedName || ''; bv = b.assignedName || ''; }
    else if (k === 'cadence') { av = a.cadence ? (a.cadence.complete ? 9999 : a.cadence.completed) : -1; bv = b.cadence ? (b.cadence.complete ? 9999 : b.cadence.completed) : -1; }
    else if (k === 'due') { av = a.due || '9999'; bv = b.due || '9999'; }
    else if (k === 'activity') { av = a.lastActivity ? a.lastActivity.date : ''; bv = b.lastActivity ? b.lastActivity.date : ''; }
    else { av = a.sales; bv = b.sales; }
    if (av < bv) return -1 * dir;
    if (av > bv) return 1 * dir;
    // Default tiebreak: priority score desc, then revenue desc, then days inactive desc (spec order)
    if ((b.reactScore || 0) !== (a.reactScore || 0)) return (b.reactScore || 0) - (a.reactScore || 0);
    if (b.sales !== a.sales) return b.sales - a.sales;
    return (b.daysLast || 0) - (a.daysLast || 0);
  });
  return rows;
}

function renderTaskList(reset) {
  if (reset) tablePage = 1;
  // Compute lane counts from full enriched set (independent of current lane)
  try {
    const todayD = new Date(); todayD.setUTCHours(0,0,0,0);
    const _notRecent = x => {
      const emails = (x.activities || []).filter(a => a.type === 'email');
      if (!emails.length) return true;
      const last = emails.reduce((m,a) => a.date > m ? a.date : m, '0000-00-00');
      return Math.round((todayD - new Date(last + 'T00:00:00Z')) / 86400000) >= 7;
    };
    const base = state.enriched.filter(e => (e.priority || e.status === 'reactivated') && e.tier !== 'T1 Strategic');
    const cMonitor = base.filter(x => x.signals.includes('MONITOR') && _notRecent(x)).length;
    const cAtRisk = base.filter(x => x.signals.includes('AT_RISK') && _notRecent(x)).length;
    const cDormant = base.filter(x => x.signals.includes('DORMANT') && _notRecent(x)).length;
    const cWraps = base.filter(x => x.signals.includes('POST_EVENT') && _notRecent(x)).length;
    const cAll = base.filter(_notRecent).length;
    const cStrategic = state.enriched.filter(e => e.tier === 'T1 Strategic').length;
    const set = (id, n) => { const el = document.getElementById(id); if (el) el.textContent = n; };
    set('lc-monitor', cMonitor); set('lc-atrisk', cAtRisk); set('lc-dormant', cDormant); set('lc-wraps', cWraps); set('lc-all', cAll); set('lc-strategic', cStrategic);
  } catch(e) {}
  const rows = getFilteredRows();
  state.filteredTasks = rows;
  document.getElementById('task-count').textContent = rows.length + ' task' + (rows.length === 1 ? '' : 's');
  const totalPages = Math.max(1, Math.ceil(rows.length / PAGE_SIZE));
  if (tablePage > totalPages) tablePage = totalPages;
  const start = (tablePage - 1) * PAGE_SIZE;
  const pageRows = rows.slice(start, start + PAGE_SIZE);
  const container = document.getElementById('task-grid');
  if (rows.length === 0) {
    const laneLabel = state.lane === 'monitor' ? 'Monitor (30-59d)' : state.lane === 'atrisk' ? 'At Risk (60-89d)' : state.lane === 'dormant' ? 'Dormant (90+d)' : state.lane === 'wraps' ? 'Recent Wraps' : state.lane === 'strategic' ? 'Strategic' : 'All Queue';
    const roleLabel = state.stepOwner && state.stepOwner !== 'all' ? ' for ' + state.stepOwner : '';
    container.innerHTML = '<div class="empty-state"><strong>No firms in ' + laneLabel + roleLabel + ' right now.</strong><br><span style="color:#94A3B8;font-size:12px;">Try a different lane or switch View as to All.</span></div>';
    return;
  }
  let head = '<thead><tr>';
  COLUMNS.forEach(c => {
    const sorted = tableSort.key === c.key;
    const arrow = sorted ? (tableSort.dir === 'asc' ? '▲' : '▼') : '↕';
    const w = c.width ? 'style="width:' + c.width + ';"' : '';
    head += '<th data-sort-key="' + c.key + '" class="' + (sorted ? 'sorted' : '') + '" ' + w + '>' + c.label + '<span class="sort-ind">' + arrow + '</span></th>';
  });
  head += '</tr></thead>';
  let body = '<tbody>';
  pageRows.forEach((r, i) => {
    const idx = start + i + 1;
    const sig = r.signals[0];
    const action = sig && SIGNAL_DEFS[sig] ? SIGNAL_DEFS[sig].action : '';
    let lac = '<span style="color:#94A3B8;font-size:11px;">No activity</span>';
    if (r.lastActivity) {
      const t = TYPE_BY_VALUE[r.lastActivity.type];
      lac = '<div style="font-size:11.5px;"><span style="font-weight:600;">' + (t ? t.label : r.lastActivity.type) + '</span><div style="color:#94A3B8;font-size:10.5px;">' + r.lastActivity.date + (r.activityCount > 1 ? ' · ' + r.activityCount + ' total' : '') + '</div></div>';
    }
    let sp;
    if (r.status === 'reactivated') sp = '<span class="status-pill status-reactivated">Reactivated</span>';
    else if (r.status === 'working') sp = '<span class="status-pill status-working">Working</span>';
    else if (r.status === 'closed') sp = '<span class="status-pill status-closed">Closed</span>';
    else sp = '<span class="status-pill status-open">Open</span>';
    body += '<tr data-row-idx="' + (start + i) + '" class="' + (r.status === 'reactivated' ? 'reactivated' : '') + '">' +
      '<td class="col-idx">' + idx + '</td>' +
      '<td><div class="firm-cell">' + r.name + '<div class="firm-sub">$' + r.sales.toLocaleString() + ' · ' + r.users + ' user' + (r.users===1?'':'s') + ' · ' + r.matters + ' matter' + (r.matters===1?'':'s') + ' · ' + r.daysLast + 'd</div></div></td>' +
      '<td>' + tierPill(r.tier) + '</td>' +
      '<td>' + scoreBar(r.score) + '</td>' +
      '<td>' + priorityPill(r.priority) + '</td>' +
      '<td>' + sp + '</td>' +
      '<td>' + signalPills(r.signals) + '</td>' +
      '<td>' + lac + '</td>' +
      '<td><div class="action-text">' + action + '</div></td>' +
      '<td><div style="font-size:11.5px;">' + escapeHtml(r.assignedRole) + '</div></td>' +'<td><div style="font-size:11.5px;"><strong>' + escapeHtml(r.assignedName) + '</strong></div></td>' +
      '<td class="col-cad">' + (r.cadence ? (r.cadence.complete ? '<span style="color:#10B981;font-weight:600;">Complete</span>' : ('Step ' + (r.cadence.completed+1) + '/' + r.cadence.total + ' · ' + escapeHtml(r.cadence.currentStep.label.split('—')[0].trim()))) : '<span style="color:#94A3B8;">—</span>') + '</td>' +
      '<td>' + (r.due || '') + '</td>' +
      '</tr>';
  });
  body += '</tbody>';
  let pag = '';
  if (rows.length > PAGE_SIZE) {
    let buttons = '<button data-page="prev"' + (tablePage === 1 ? ' disabled' : '') + '>‹ Prev</button>';
    let first = Math.max(1, tablePage - 3), last = Math.min(totalPages, first + 6);
    first = Math.max(1, last - 6);
    if (first > 1) buttons += '<button data-page="1">1</button>' + (first > 2 ? '<span>...</span>' : '');
    for (let p = first; p <= last; p++) buttons += '<button data-page="' + p + '" class="' + (p === tablePage ? 'current' : '') + '">' + p + '</button>';
    if (last < totalPages) buttons += (last < totalPages - 1 ? '<span>...</span>' : '') + '<button data-page="' + totalPages + '">' + totalPages + '</button>';
    buttons += '<button data-page="next"' + (tablePage === totalPages ? ' disabled' : '') + '>Next ›</button>';
    pag = '<div class="pagination-bar"><span>Showing ' + (start + 1) + '–' + Math.min(start + PAGE_SIZE, rows.length) + ' of ' + rows.length + '</span><span class="page-btns">' + buttons + '</span></div>';
  }
  container.innerHTML = '<div class="table-wrap"><table class="task-table">' + head + body + '</table></div>' + pag;
  container.querySelectorAll('th[data-sort-key]').forEach(th => th.addEventListener('click', () => {
    const k = th.dataset.sortKey;
    if (k === 'idx') return;
    if (tableSort.key === k) tableSort.dir = tableSort.dir === 'asc' ? 'desc' : 'asc';
    else { tableSort.key = k; tableSort.dir = (k === 'score' || k === 'activity') ? 'desc' : 'asc'; }
    renderTaskList(false);
  }));
  container.querySelectorAll('tr[data-row-idx]').forEach(tr => tr.addEventListener('click', () => openDrawer(rows[parseInt(tr.dataset.rowIdx, 10)])));
  container.querySelectorAll('button[data-page]').forEach(btn => btn.addEventListener('click', () => {
    const p = btn.dataset.page;
    if (p === 'prev') tablePage = Math.max(1, tablePage - 1);
    else if (p === 'next') tablePage = Math.min(totalPages, tablePage + 1);
    else tablePage = parseInt(p, 10);
    renderTaskList(false);
  }));
}

function logActivity(firm) {
  const type = document.getElementById('activity-type').value;
  const date = document.getElementById('activity-date').value;
  const note = document.getElementById('activity-note').value.trim();
  const owner = document.getElementById('activity-owner').value.trim();
  if (!type || !date) { alert('Type and date required.'); return; }
  if (!state.activity[firm.tenantId]) state.activity[firm.tenantId] = [];
  state.activity[firm.tenantId].push({ id: 'a_' + Math.random().toString(36).slice(2, 10), type, date, note, owner, createdAt: new Date().toISOString() });
  saveLocal();
  enrich(); renderAll();
  const u = state.enriched.find(e => e.tenantId === firm.tenantId);
  if (u) openDrawer(u);
}

function delAct(firm, id) {
  if (!confirm('Delete this activity?')) return;
  state.activity[firm.tenantId] = (state.activity[firm.tenantId] || []).filter(a => a.id !== id);
  if (state.activity[firm.tenantId].length === 0) delete state.activity[firm.tenantId];
  saveLocal();
  enrich(); renderAll();
  const u = state.enriched.find(e => e.tenantId === firm.tenantId);
  if (u) openDrawer(u);
}

function closeTask(firm) {
  const reason = prompt('Reason for closing (optional)?', '');
  if (reason === null) return;
  state.closed[firm.tenantId] = { closedAt: new Date().toISOString(), reason: reason || '' };
  saveLocal();
  enrich(); renderAll();
  const u = state.enriched.find(e => e.tenantId === firm.tenantId);
  if (u) openDrawer(u);
}

function reopenTask(firm) {
  delete state.closed[firm.tenantId];
  saveLocal();
  enrich(); renderAll();
  const u = state.enriched.find(e => e.tenantId === firm.tenantId);
  if (u) openDrawer(u);
}

document.getElementById('file-import-activity').addEventListener('change', (e) => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try {
      const text = ev.target.result;
      const lines = text.split(/\r?\n/).filter(l => l.trim().length > 0 && !l.trim().startsWith('#'));
      if (!lines.length) { alert('Empty file.'); return; }
      // Parse header
      const header = parseCsvLine(lines[0]).map(h => h.trim().toLowerCase());
      const iFirm = header.indexOf('firm');
      const iType = header.indexOf('type');
      const iDate = header.indexOf('date');
      const iOwner = header.indexOf('owner');
      const iNote = header.indexOf('note');
      if (iFirm < 0 || iType < 0 || iDate < 0) {
        alert('CSV must have columns: Firm, Type, Date (Owner and Note optional).');
        return;
      }
      // Build firm-name -> tenantId index from current state
      const byName = {};
      state.firms.forEach(f => { byName[f.name.toLowerCase().trim()] = f.tenantId; });
      const validTypes = new Set(['email','voicemail','call','meeting_booked','meeting_completed','demo','qbr','note']);
      let added = 0, skipped = 0, errors = [];
      for (let i = 1; i < lines.length; i++) {
        const cols = parseCsvLine(lines[i]);
        const firmName = (cols[iFirm] || '').trim();
        const type = (cols[iType] || '').trim().toLowerCase();
        const date = (cols[iDate] || '').trim();
        const owner = iOwner >= 0 ? (cols[iOwner] || '').trim() : '';
        const note = iNote >= 0 ? (cols[iNote] || '').trim() : '';
        if (!firmName || !type || !date) { skipped++; continue; }
        const tid = byName[firmName.toLowerCase()];
        if (!tid) { errors.push('Firm not found: ' + firmName); skipped++; continue; }
        if (!validTypes.has(type)) { errors.push('Invalid type for ' + firmName + ': ' + type); skipped++; continue; }
        if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) { errors.push('Bad date for ' + firmName + ': ' + date); skipped++; continue; }
        if (!state.activity[tid]) state.activity[tid] = [];
        // De-dupe — skip if same type+date already present
        const exists = state.activity[tid].some(a => a.type === type && a.date === date);
        if (exists) { skipped++; continue; }
        state.activity[tid].push({
          id: 'imp_' + Math.random().toString(36).slice(2, 10),
          type: type, date: date, note: note, owner: owner,
          createdAt: new Date().toISOString()
        });
        added++;
      }
      saveLocal(); enrich(); renderAll();
      let msg = 'Imported ' + added + ' activities. Skipped ' + skipped + '.';
      if (errors.length) msg += '\n\nFirst few errors:\n' + errors.slice(0,8).join('\n');
      alert(msg);
    } catch (err) {
      console.error(err);
      alert('Import failed: ' + err.message);
    }
    e.target.value = '';
  };
  reader.readAsText(file);
});
function parseCsvLine(line) {
  const out = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQ) {
      if (c === '"' && line[i+1] === '"') { cur += '"'; i++; }
      else if (c === '"') { inQ = false; }
      else { cur += c; }
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { out.push(cur); cur = ''; }
      else { cur += c; }
    }
  }
  out.push(cur);
  return out;
}
